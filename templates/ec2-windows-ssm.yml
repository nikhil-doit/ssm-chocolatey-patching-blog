AWSTemplateFormatVersion: '2010-09-09'
Description: Windows Server EC2 instance with SSM Agent role for Chocolatey testing

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet with internet access (public or NAT)
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for the instance
  InstanceType:
    Type: String
    Default: t3.medium
  InstanceName:
    Type: String
    Default: SSM-Choco-Test

Resources:
  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'SSMWindowsRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMRole

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base}}'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroupId
      Tags:
        - Key: Name
          Value: !Ref InstanceName
        - Key: PatchGroup
          Value: chocolatey

Outputs:
  InstanceId:
    Value: !Ref WindowsInstance
  RoleArn:
    Value: !GetAtt SSMRole.Arn
