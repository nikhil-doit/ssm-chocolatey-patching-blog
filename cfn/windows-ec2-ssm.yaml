AWSTemplateFormatVersion: '2010-09-09'
Description: Windows Server EC2 instances with SSM Agent for third-party patching demo

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for RDP access
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to launch instances in
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet to launch instances in

Resources:
  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SSMPatchingInstanceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMInstanceRole

  WindowsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow RDP access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0

  WindowsServer1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref WindowsSecurityGroup
      Tags:
        - Key: Name
          Value: WindowsServer-Patching-1
        - Key: PatchGroup
          Value: ThirdPartyApps

  WindowsServer2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref WindowsSecurityGroup
      Tags:
        - Key: Name
          Value: WindowsServer-Patching-2
        - Key: PatchGroup
          Value: ThirdPartyApps

Outputs:
  Instance1Id:
    Value: !Ref WindowsServer1
  Instance2Id:
    Value: !Ref WindowsServer2
  SecurityGroupId:
    Value: !Ref WindowsSecurityGroup
