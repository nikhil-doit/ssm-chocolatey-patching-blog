AWSTemplateFormatVersion: '2010-09-09'
Description: CodePipeline - GitHub to CloudFormation StackSet (Management Account)

Parameters:
  ConnectionArn:
    Type: String
    Description: CodeStar Connection ARN for GitHub
  GitHubRepo:
    Type: String
    Default: nikhil-doit/ssm-chocolatey-patching-blog
  BranchName:
    Type: String
    Default: main
  DeploymentTargets:
    Type: String
    Description: OU ID or comma-separated Account IDs (e.g., ou-xxxx-yyyy or 111111111111,222222222222)
  TargetRegions:
    Type: String
    Default: us-east-1
  NotificationEmail:
    Type: String
    Description: Email for approval notifications
    Default: ''

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ssm-choco-pipeline-artifacts-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ssm-choco-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub '${ArtifactBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - codeconnections:UseConnection
                  - codestar-connections:UseConnection
                Resource: !Ref ConnectionArn
              - Effect: Allow
                Action:
                  - cloudformation:*
                  - organizations:List*
                  - organizations:Describe*
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt StackSetAdminRole.Arn

  StackSetAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ssm-choco-stackset-admin-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: ssm-chocolatey-deploy
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref ConnectionArn
                FullRepositoryId: !Ref GitHubRepo
                BranchName: !Ref BranchName
                DetectChanges: 'true'
              OutputArtifacts:
                - Name: SourceOutput

        - Name: Approval
          Actions:
            - Name: ManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: '1'
              Configuration:
                CustomData: !Sub 'Deploy to targets: ${DeploymentTargets} in ${TargetRegions}. Approve?'

        - Name: Deploy-EC2-Instances
          Actions:
            - Name: DeployEC2StackSet
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormationStackSet
                Version: '1'
              Configuration:
                StackSetName: ssm-choco-ec2-windows
                TemplatePath: SourceOutput::templates/ec2-windows-ssm.yml
                PermissionModel: SELF_MANAGED
                AdministrationRoleArn: !GetAtt StackSetAdminRole.Arn
                ExecutionRoleName: AWSCloudFormationStackSetExecutionRole
                DeploymentTargets: !Ref DeploymentTargets
                Regions: !Ref TargetRegions
                ParameterOverrides: |
                  [
                    {"ParameterKey": "SubnetId", "ParameterValue": "REPLACE_ME"},
                    {"ParameterKey": "SecurityGroupId", "ParameterValue": "REPLACE_ME"}
                  ]
              InputArtifacts:
                - Name: SourceOutput

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
